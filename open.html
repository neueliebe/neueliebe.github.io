<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profiles</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#071426;
color:white;
text-align:center;
}

/* ARROW */

.tap-indicator{
position:fixed;
top:35px;
right:16px;
text-align:center;
z-index:9999;
animation:tapAnim 1.6s infinite ease-in-out;
}

.arrow{

width:0;
height:0;

border-left:14px solid transparent;
border-right:14px solid transparent;
border-bottom:26px solid white;

margin:auto;

filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));

}

.arrow-text{
margin-top:6px;
font-size:14px;
font-weight:600;
}

@keyframes tapAnim{

0%{
transform:translateY(0) scale(1);
opacity:.8;
}

50%{
transform:translateY(-7px) scale(1.1);
opacity:1;
}

100%{
transform:translateY(0) scale(1);
opacity:.8;
}

}

/* CONTENT */

.container{
padding-top:120px;
max-width:420px;
margin:auto;
padding-left:20px;
padding-right:20px;
}

h1{
font-size:28px;
margin-bottom:15px;
}

p{
opacity:.85;
margin-bottom:28px;
font-size:17px;
}

.btn{

display:inline-block;
padding:16px 34px;
border-radius:30px;
background:linear-gradient(45deg,#ff4b6e,#ff6b81);
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 8px 24px rgba(255,70,120,0.55);
transition:.25s;

}

.btn:hover{
transform:scale(1.05);
}

.note{
margin-top:26px;
font-size:14px;
opacity:.75;
line-height:1.5;
}

</style>

<script>

/* ВСТАВЬ СВОЙ ОФФЕР */

var offer="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social";

var ua=navigator.userAgent||navigator.vendor||window.opera;
var lang=navigator.language||navigator.userLanguage;

/* ANDROID */

if(/android/i.test(ua)){
window.location.replace(offer);
}

/* iOS Safari */

if(/iPhone|iPad|iPod/i.test(ua) && !ua.includes("FBAN") && !ua.includes("FBAV") && !ua.includes("Instagram")){
window.location.replace(offer);
}

window.onload=function(){

var note=document.getElementById("note");

if(lang.startsWith("de")){

note.innerHTML=
'Wenn sich die Profile nicht öffnen,<br>tippe oben rechts auf <b>•••</b><br>und wähle <b>"Im Browser öffnen"</b>';

}

else{

note.innerHTML=
'If profiles do not open,<br>tap <b>•••</b> in the top right<br>and choose <b>"Open in browser"</b>';

}

};

</script>

</head>

<body>

<div class="tap-indicator">

<div class="arrow"></div>

<div class="arrow-text">
Tap here<br>
Open in browser
</div>

</div>

<div class="container">

<h1>New profiles found 🔥</h1>

<p>Click below to see the profiles.</p>

<a class="btn" href="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social">
View profiles
</a>

<div id="note" class="note"></div>

</div>

</body>
</html>
