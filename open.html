<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profiles</title>

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

.box{
max-width:420px;
padding:30px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:16px 28px;
border-radius:14px;
background:linear-gradient(45deg,#ec4899,#f43f5e);
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 10px 30px rgba(236,72,153,.4);
}

.tip{
margin-top:30px;
font-size:14px;
color:#94a3b8;
}

.arrow{

position:fixed;
top:70px;
right:15px;

font-size:48px;

animation:arrowMove 1.4s infinite;

}

@keyframes arrowMove{

0%{transform:translate(0,0)}

50%{transform:translate(6px,-6px)}

100%{transform:translate(0,0)}

}

</style>

</head>

<body>

<div class="box">

<h2 id="title">Neue Profile gefunden 🔥</h2>

<p id="text">Klicken Sie unten um die Profile zu sehen.</p>

<a href="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social" class="btn" id="btn">
Profile ansehen
</a>

<div class="tip" id="tipText">

Tap <b>•••</b> in the top right<br>
and choose <b>"Open in browser"</b>

</div>

</div>

<div class="arrow" id="arrow">↗</div>

<script>

// ===== DEVICE DETECT =====

const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);

if(!isIOS){

// Android / PC → сразу редирект

window.location.href="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social";

}

// ===== GEO LANGUAGE =====

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{

const country=data.country;

if(country==="DE" || country==="AT" || country==="CH"){

document.getElementById("tipText").innerHTML=
'Tippe oben rechts auf <b>•••</b><br>und wähle <b>"Im Browser öffnen"</b>';

document.getElementById("btn").innerText="Profile ansehen";

document.getElementById("title").innerText="Neue Profile gefunden 🔥";

document.getElementById("text").innerText="Klicken Sie unten um die Profile zu sehen.";

}

});

</script>

</body>
</html>
