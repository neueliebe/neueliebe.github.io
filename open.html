<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profiles</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#071426;
color:white;
text-align:center;
}

/* arrow indicator */

.tap-indicator{
position:fixed;
top:40px;
right:10px;
text-align:center;
z-index:9999;
animation:floatArrow 1.6s infinite ease-in-out;
}

.menu-arrow{
width:75px;
height:75px;
margin:auto;
}

.menu-arrow path{
stroke:#4da3ff;
stroke-width:6;
fill:none;
stroke-linecap:round;
stroke-linejoin:round;
filter:drop-shadow(0 4px 6px rgba(0,0,0,0.5));
stroke-dasharray:200;
stroke-dashoffset:200;
animation:drawArrow 2s infinite;
}

.menu-arrow polygon{
fill:#4da3ff;
}

.arrow-text{
margin-top:4px;
font-size:14px;
font-weight:600;
}

@keyframes drawArrow{

0%{
stroke-dashoffset:200;
}

50%{
stroke-dashoffset:0;
}

100%{
stroke-dashoffset:0;
}

}

@keyframes floatArrow{

0%{transform:translateY(0)}
50%{transform:translateY(-7px)}
100%{transform:translateY(0)}

}

/* content */

.container{
padding-top:120px;
max-width:420px;
margin:auto;
padding-left:20px;
padding-right:20px;
}

h1{
font-size:28px;
margin-bottom:15px;
}

p{
opacity:.85;
margin-bottom:28px;
font-size:17px;
}

/* button */

.btn{

display:inline-block;
padding:16px 34px;
border-radius:30px;
background:linear-gradient(45deg,#ff4b6e,#ff6b81);
color:white;
text-decoration:none;
font-weight:bold;
font-size:18px;
box-shadow:0 8px 24px rgba(255,70,120,0.55);

animation:pulseBtn 2.8s infinite;

}

@keyframes pulseBtn{

0%{transform:scale(1)}
50%{transform:scale(1.06)}
100%{transform:scale(1)}

}

.note{
margin-top:26px;
font-size:14px;
opacity:.75;
line-height:1.5;
}

</style>

<script>

var offer="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social";

var ua=navigator.userAgent||navigator.vendor||window.opera;
var lang=navigator.language||navigator.userLanguage;

/* android redirect */

if(/android/i.test(ua)){
window.location.replace(offer);
}

/* ios safari redirect */

if(/iPhone|iPad|iPod/i.test(ua) && !ua.includes("FBAN") && !ua.includes("FBAV") && !ua.includes("Instagram")){
window.location.replace(offer);
}

window.onload=function(){

var arrow=document.getElementById("arrowText");
var title=document.getElementById("title");
var desc=document.getElementById("desc");
var btn=document.getElementById("btnText");
var note=document.getElementById("note");

/* german */

if(lang.startsWith("de")){

arrow.innerHTML="Hier tippen<br>Im Browser öffnen";

title.innerHTML="Neue Profile gefunden 🔥";

desc.innerHTML="Klicke unten um die Profile zu sehen.";

btn.innerHTML="Profile ansehen";

note.innerHTML='Wenn sich die Profile nicht öffnen,<br>tippe oben rechts auf <b>•••</b><br>und wähle <b>"Im Browser öffnen"</b>';

}

/* english */

else{

arrow.innerHTML="Tap here<br>Open in browser";

title.innerHTML="New profiles found 🔥";

desc.innerHTML="Click below to see the profiles.";

btn.innerHTML="View profiles";

note.innerHTML='If profiles do not open,<br>tap <b>•••</b> in the top right<br>and choose <b>"Open in browser"</b>';

}

};

</script>

</head>

<body>

<div class="tap-indicator">

<svg class="menu-arrow" viewBox="0 0 120 120">
<path d="M20 90 C40 70, 70 70, 95 35"></path>
<polygon points="95,35 80,38 90,50"></polygon>
</svg>

<div class="arrow-text" id="arrowText">
Tap here<br>Open in browser
</div>

</div>

<div class="container">

<h1 id="title">New profiles found 🔥</h1>

<p id="desc">Click below to see the profiles.</p>

<a class="btn" id="btnText" href="https://go.cm-trk6.com/aff_f?h=rA47F6&aff_sub5=free-social">
View profiles
</a>

<div id="note" class="note"></div>

</div>

</body>
</html>
